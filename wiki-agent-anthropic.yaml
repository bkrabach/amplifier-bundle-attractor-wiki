bundle:
  name: wiki-agent-anthropic
  version: 0.3.0
  description: >
    Attractor Anthropic agent for the wiki pipelines. Runs SCHEMA-DRIVEN: the
    load-bearing contract (status discipline, entity types, cross-ref rules) lives
    in the project's .wiki/context/schema.md, which the box nodes read via their
    filesystem tools. No llm-wiki bundle orientation is wired in — see the note below.

# PIPELINE portability (PROVEN): pull the attractor agent base by git URL so the
# pipeline runs with ZERO dependency on workspace-sibling checkouts. Verified by a
# sibling-less headless ingest (no sibling repos beside the companion) — load +
# prepare + a GREEN wiki-ingest run, all upstream resolved from GitHub.
includes:
  - bundle: git+https://github.com/microsoft/amplifier-bundle-attractor@main#subdirectory=agents/attractor-agent-anthropic.yaml

# ───────────────────────────────────────────────────────────────────────────────
# Why no llm-wiki orientation here (decided by evidence, two findings):
#   1. It can't be delivered anyway. The attractor spawn path (loop-agent) drops ALL
#      profile system-prompt content — both `context.include` AND a markdown-body
#      `instruction:` were proven non-delivering via sentinel tests. (Upstream bug,
#      written up in UPSTREAM-ISSUE-context-include.md.) Only per-node prompt text
#      reaches a box node.
#   2. It isn't worth delivering. A matched A/B (orientation prepended to every node
#      prompt — the one channel that DOES deliver — vs not) showed NO status-calibration
#      improvement: deterministic status-honesty oracle = 0 errors both arms, judge = tie.
#      The settled/working/unsettled discipline lives in schema.md, which both arms
#      already read via tools; the orientation text doesn't even contain that vocabulary.
# So the agent is intentionally schema-driven. Don't re-add orientation to chase the
# status caveat — the lever is the schema + the deterministic status-honesty gate in
# verify.sh, not orientation delivery.
# ───────────────────────────────────────────────────────────────────────────────
